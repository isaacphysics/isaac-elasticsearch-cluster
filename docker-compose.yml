      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.security.transport.ssl.client_authentication=required
      - xpack.security.transport.ssl.keystore.path=certs/elastic-v9-certificates.p12
      - xpack.security.transport.ssl.truststore.path=certs/elastic-v9-certificates.p12
      - xpack.security.http.ssl.enabled=false
      - xpack.ml.enabled=false
    ulimits:
      memlock: -1 # part of disabling swap
      nproc: 4096 # doc suggestion: at least 4,096
