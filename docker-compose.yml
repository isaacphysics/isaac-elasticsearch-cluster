# For Elasticsearch to store its indexes, we usually need to increase the host machine's mmap count: https://www.elastic.co/guide/en/elasticsearch/reference/current/vm-max-map-count.html
# If `sysctl vm.max_map_count` is < 262144, then `sysctl -w vm.max_map_count=262144` and set vm.max_map_count in /etc/sysctl.conf to the same value # elasticsearch(lx) had 16777215
services:
  sci-elasticsearch-v9-live:
    # container configuration https://www.elastic.co/guide/en/elasticsearch/reference/current/docker.html
    container_name: sci-elasticsearch-v9-live
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.3
    environment:
      - "cluster.name=sci-content-v9"
      - "network.host=${LOCAL_SCI_ELASTICSEARCH_V9_IP}"
      - "discovery.seed_hosts=${REMOTE_SCI_ELASTICSEARCH_V9_IP},${LOCAL_SCI_ELASTICSEARCH_V9_IP},${REMOTE_SCI_ELASTICSEARCH_V9_VOTER_IP}" # other master-eligible nodes
      - "ES_JAVA_OPTS=-Xms6g -Xmx6g"
      - "bootstrap.memory_lock=true" # part of disabling swap
      - "node.name=${HOSTNAME}-sci-node"
      # ! When starting a brand new Elasticsearch cluster for the first time, un-comment for cluster bootstrap VV
      # - "cluster.initial_master_nodes=${HOSTNAME}-sci-node"
      - "http.max_content_length=512mb"
      - ingest.geoip.downloader.enabled=false
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${SCI_ELASTIC_PASSWORD}
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.security.transport.ssl.client_authentication=required
      - xpack.security.transport.ssl.keystore.path=certs/elastic-v9-certificates.p12
      - xpack.security.transport.ssl.truststore.path=certs/elastic-v9-certificates.p12
      - xpack.security.http.ssl.enabled=false
      - xpack.ml.enabled=false
    ulimits:
      memlock: -1 # part of disabling swap
      nproc: -1 # doc suggestion: at least 4,096 our docker default is unlimited
      nofile: 1048576 # doc suggestion: at least 65,536
    volumes:
      - elasticsearch-v9-sci-data:/usr/share/elasticsearch/data
      - /local/data/elasticsearch/certificates:/usr/share/elasticsearch/config/certs
    networks:
      default:
        ipv4_address: "${LOCAL_SCI_ELASTICSEARCH_V9_IP}"
    restart: unless-stopped

  sci-elasticsearch-v9-voter-live:
    # container configuration https://www.elastic.co/guide/en/elasticsearch/reference/current/docker.html
    container_name: sci-elasticsearch-v9-voter-live
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.3
    environment:
      - "cluster.name=sci-content-v9"
      - "network.host=${LOCAL_SCI_ELASTICSEARCH_V9_VOTER_IP}"
      - "discovery.seed_hosts=${LOCAL_SCI_ELASTICSEARCH_V9_IP},${REMOTE_SCI_ELASTICSEARCH_V9_IP},${REMOTE_SCI_ELASTICSEARCH_V9_VOTER_IP}" # other master-eligible nodes
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - "bootstrap.memory_lock=true" # part of disabling swap
      - "node.name=${HOSTNAME}-sci-voter-node"
      - "node.roles=master,voting_only"
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${SCI_ELASTIC_PASSWORD}
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.security.transport.ssl.client_authentication=required
      - xpack.security.transport.ssl.keystore.path=certs/elastic-v9-certificates.p12
      - xpack.security.transport.ssl.truststore.path=certs/elastic-v9-certificates.p12
      - xpack.security.http.ssl.enabled=false
      - xpack.ml.enabled=false
    ulimits:
      memlock: -1 # part of disabling swap
      nproc: 4096 # doc suggestion: at least 4,096
      nofile: 65536 # doc suggestion: at least 65,536
    volumes:
      - /local/data/elasticsearch/certificates:/usr/share/elasticsearch/config/certs
    networks:
      default:
        ipv4_address: "${LOCAL_SCI_ELASTICSEARCH_V9_VOTER_IP}"
    restart: unless-stopped

  ada-elasticsearch-v9-live:
    # container configuration https://www.elastic.co/guide/en/elasticsearch/reference/current/docker.html
