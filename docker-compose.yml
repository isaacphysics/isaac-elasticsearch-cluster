      - "discovery.seed_hosts=${LOCAL_ADA_ELASTICSEARCH_V9_IP},${REMOTE_ADA_ELASTICSEARCH_V9_IP},${REMOTE_ADA_ELASTICSEARCH_V9_VOTER_IP}" # other master-eligible nodes
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
