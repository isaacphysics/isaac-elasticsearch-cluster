    restart: unless-stopped

volumes:
  elasticsearch-v9-sci-data:
    name: elasticsearch-v9-sci-data
    external: true
  elasticsearch-v9-ada-data:
    name: elasticsearch-v9-ada-data
    external: true

networks:
  default:
    name: isaac
    external: true
